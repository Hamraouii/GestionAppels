<h2>Types de demande</h2>
<button mat-raised-button color="primary" (click)="onCreate()">Créer un type</button>
<table mat-table [dataSource]="types" class="mat-elevation-z8" *ngIf="!isLoading">
  <ng-container matColumnDef="intituleDemande">
    <th mat-header-cell *matHeaderCellDef>Intitulé</th>
    <td mat-cell *matCellDef="let type">{{type.intituleDemande}}</td>
  </ng-container>
  <ng-container matColumnDef="descriptionDemande">
    <th mat-header-cell *matHeaderCellDef>Description</th>
    <td mat-cell *matCellDef="let type">{{type.descriptionDemande}}</td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let type">
      <button mat-button (click)="onEdit(type)">Modifier</button>
      <button mat-button color="warn" (click)="onDelete(type)">Supprimer</button>
      <button mat-button color="accent" (click)="onManageSousTypes(type)">Sous-types</button>
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="['intituleDemande', 'descriptionDemande', 'actions']"></tr>
  <tr mat-row *matRowDef="let row; columns: ['intituleDemande', 'descriptionDemande', 'actions'];"></tr>
</table>
<div *ngIf="isLoading">Chargement...</div>
