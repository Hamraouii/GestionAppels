<h2>{{ isEdit ? 'Modifier le sous-type' : 'Créer un sous-type' }}</h2>
<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <mat-form-field appearance="fill">
    <mat-label>Intitulé</mat-label>
    <input matInput formControlName="intitule" required>
  </mat-form-field>
  <mat-form-field appearance="fill">
    <mat-label>Description</mat-label>
    <input matInput formControlName="description">
  </mat-form-field>
  <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">{{ isEdit ? 'Enregistrer' : 'Créer' }}</button>
  <button mat-button type="button" (click)="onCancel()">Annuler</button>
</form>
