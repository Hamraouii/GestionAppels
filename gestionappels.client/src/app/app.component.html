<ng-container *ngIf="isAuthenticated$ | async">
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #drawer [mode]="'side'" [opened]="opened" [(opened)]="opened" [fixedInViewport]="true" [autoFocus]="false" [class.folded]="folded">
    <div class="sidebar-header">
      <button mat-icon-button (click)="toggleSidebar()" style="margin-left: auto; display: block;">
        <mat-icon>{{ folded ? 'menu_open' : 'menu' }}</mat-icon>
      </button>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/home" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
        <mat-icon matListIcon>dashboard</mat-icon>
        <span *ngIf="!folded">Tableau de Bord</span>
      </a>
      <a mat-list-item routerLink="/fiches" routerLinkActive="active-link">
        <mat-icon matListIcon>description</mat-icon>
        <span *ngIf="!folded">Fiches</span>
      </a>
      <mat-divider *ngIf="isAdmin"></mat-divider>
      <a mat-list-item *ngIf="isAdmin" [routerLink]="['/demandes/types']" routerLinkActive="active-link">
        <mat-icon matListIcon>category</mat-icon>
        <span *ngIf="!folded">Types de Demande</span>
      </a>
      <!-- Ajoutez d'autres liens admin ici si besoin -->
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content [style.margin-left.px]="folded ? 60 : 250">
    <!-- Main Header MOVED HERE -->
    <header class="main-header">
      <mat-toolbar color="primary">
        <div class="logo-section">
          <img src="/mgpap-logo.png" alt="MGPAP Logo" class="mgpap-logo" style="height: 40px; margin-right: 10px;">
          <div class="app-title">
            <span>Centre d'Appels MGPAP</span>
          </div>
        </div>
        <span class="toolbar-spacer"></span>
        <nav class="main-nav">
          <a mat-button routerLink="/home" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
            <mat-icon>dashboard</mat-icon>
            <span>Tableau de Bord</span>
          </a>
          <a mat-button routerLink="/fiches" routerLinkActive="active-link">
            <mat-icon>description</mat-icon>
            <span>Fiches</span>
          </a>
        </nav>
        <span class="toolbar-spacer"></span>
        <div class="user-actions">
          <button mat-button>
            <mat-icon>account_circle</mat-icon>
            <span>{{ username }}</span>
          </button>
          <button mat-button class="logout-btn" (click)="logout()">
            <mat-icon>exit_to_app</mat-icon>
            <span>Déconnexion</span>
          </button>
        </div>
      </mat-toolbar>
    </header>

    <main class="main-content-area" style="padding: 20px;">
      <router-outlet></router-outlet>
    </main>
    
    <footer class="app-footer" style="text-align: center; padding: 10px; border-top: 1px solid #e0e0e0;">
      <p>&copy; {{ currentYear }} MGPAP - Tous droits réservés </p>
    </footer>
  </mat-sidenav-content>
  </mat-sidenav-container>
</ng-container>

<ng-container *ngIf="!(isAuthenticated$ | async)">
  <router-outlet></router-outlet>
</ng-container>
