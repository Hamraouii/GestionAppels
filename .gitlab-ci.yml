# GitLab CI/CD pipeline for .NET and Angular application

variables:
  # IMAGE_TAG is composed of the project name and the current Git commit SHA
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  # Use the Docker-in-Docker driver
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

stages:
  - build
  - test
  - package
  - deploy

#===============================================================================
# Build Stage
#===============================================================================

build_app:
  stage: build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  script:
    - echo "Building the Docker image..."
    # Login to the GitLab Container Registry
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Build the Docker image
    - docker build -t $IMAGE_TAG -f ./GestionAppels.Server/Dockerfile .
    # Save the image as an artifact to be used in the next stage
    - docker save $IMAGE_TAG > image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour

#===============================================================================
# Test Stage
#===============================================================================

# Job to run Angular tests
angular_tests:
  stage: test
  image: node:20 # Use a Node.js image for Angular tests
  before_script:
    # Navigate to the client app directory
    - cd gestionappels.client
    # Install npm dependencies
    - echo "Installing Angular dependencies..."
    - npm install
  script:
    # Run Angular tests
    - echo "Running Angular tests..."
    - npm run test -- --watch=false --browsers=ChromeHeadless
  needs: [] # Run in parallel with other jobs

# Placeholder for .NET tests
# dotnet_tests:
#   stage: test
#   image: mcr.microsoft.com/dotnet/sdk:9.0
#   script:
#     - echo "Running .NET tests..."
#     - dotnet test # Assuming you have a test project
#   needs: []

#===============================================================================
# Package Stage
#===============================================================================

package_app:
  stage: package
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  dependencies:
    - build_app # Depends on the build job
  before_script:
    # Load the Docker image from the artifact
    - docker load < image.tar
  script:
    - echo "Pushing the Docker image to the GitLab Registry..."
    # Login to the GitLab Container Registry
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Push the image
    - docker push $IMAGE_TAG

#===============================================================================
# Deploy Stage
#===============================================================================

